version: '3.8'

services:
  # PostgreSQL - persistent data
  postgres:
    image: postgres:16-alpine
    container_name: clique-db
    environment:
      POSTGRES_USER: clique
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: clique
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clique"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - ephemeral stories, presence, cache
  redis:
    image: redis:7-alpine
    container_name: clique-cache
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # MinIO - S3-compatible object storage for media
  minio:
    image: minio/minio:latest
    container_name: clique-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clique
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clique-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://clique:${DB_PASSWORD}@postgres:5432/clique
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: clique
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: npm run dev

  # Media processing worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: clique-worker
    environment:
      DATABASE_URL: postgresql://clique:${DB_PASSWORD}@postgres:5432/clique
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: clique
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - minio
  # YOLO Object Detection Service
  yolo-service:
    build:
      context: ./yolo-service
      dockerfile: Dockerfile
    container_name: clique-yolo
    ports:
      - "8000:8000"
    volumes:
      - ./yolo-service:/app
    environment:
      PORT: 8000

volumes:
  postgres_data:
  redis_data:
  minio_data:
