<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demande Reçue | CLIQUE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --obsidian: #050505;
        --gold: #d4af37;
        --gold-bright: #f9d71c;
        --gold-dark: #a67c00;
        --suede-text: #e8e8e1;
        --gold-glow: 0 10px 40px rgba(212, 175, 55, 0.4);
        --card-grad: linear-gradient(145deg, #0e0e0e, #030303);
      }

      body {
        background-color: var(--obsidian);
        color: var(--suede-text);
        font-family: "Outfit", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }

      .success-card {
        padding: 5rem;
        background: var(--card-grad);
        border: 2px solid var(--gold);
        border-radius: 30px;
        box-shadow:
          30px 30px 80px #010101,
          -10px -10px 60px rgba(212, 175, 55, 0.05),
          inset 0 0 20px rgba(212, 175, 55, 0.1);
        position: relative;
        overflow: hidden;
        animation: cardEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .success-card::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent 45%,
          rgba(212, 175, 55, 0.1) 50%,
          transparent 55%
        );
        animation: sheen 4s infinite;
      }

      @keyframes sheen {
        0% {
          transform: translateX(-30%) translateY(-30%);
        }
        100% {
          transform: translateX(30%) translateY(30%);
        }
      }

      .gold-key {
        font-size: 5rem;
        margin-bottom: 2rem;
        display: block;
        text-shadow: var(--gold-glow);
      }

      h1 {
        color: var(--gold);
        font-weight: 900;
        letter-spacing: 0.5rem;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }

      p {
        font-size: 1.2rem;
        line-height: 1.6;
        color: #bbb;
        max-width: 400px;
        margin: 0 auto 2rem;
      }

      .id-badge {
        background: var(--gold);
        color: var(--obsidian);
        padding: 0.5rem 1.5rem;
        border-radius: 5px;
        font-weight: 900;
        letter-spacing: 0.1rem;
      }

      @keyframes cardEntrance {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="success-card">
      <span class="gold-key">🔑</span>
      <h1>CLIQUE</h1>
      <p>
        Votre place parmi les 100 premiers Souverains a été réservée. L'accès à
        la CLIQUE est imminent.
      </p>
      <div class="id-badge">SÉCURITÉ VÉRIFIÉE</div>
    </div>
  </body>
</html>
