<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demande Reçue | CLIQUE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --obsidian: #050505;
        --gold: #d4af37;
        --gold-bright: #ffefaf;
        --gold-dark: #8c6d1f;
        --suede-text: #e8e8e1;
        --gold-glow: 0 20px 50px rgba(212, 175, 55, 0.5);
        --bullion-grad: linear-gradient(
          to bottom right,
          #d4af37 0%,
          #ffefaf 20%,
          #d4af37 40%,
          #8c6d1f 60%,
          #d4af37 80%,
          #ffefaf 100%
        );
      }

      body {
        background-color: var(--obsidian);
        color: var(--suede-text);
        font-family: "Outfit", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }

      .success-card {
        padding: 5rem;
        background: var(--bullion-grad);
        color: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px; /* Bullion bar shape */
        box-shadow:
          0 30px 100px rgba(0, 0, 0, 1),
          inset 2px 2px 0 rgba(255, 255, 255, 0.5),
          inset -2px -2px 0 rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden;
        animation: cardEntrance 1.5s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .success-card::after {
        content: "CLIQUE • 999.9 FINE GOLD • 1 OF 100";
        position: absolute;
        bottom: 15px;
        left: 0;
        width: 100%;
        font-size: 0.7rem;
        font-weight: 900;
        opacity: 0.2;
        letter-spacing: 0.3rem;
        text-align: center;
      }

      .gold-key {
        font-size: 6rem;
        margin-bottom: 2rem;
        display: block;
        filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6));
        animation: keyFloat 3s ease-in-out infinite;
      }

      @keyframes keyFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      h1 {
        color: rgba(0, 0, 0, 0.9);
        font-weight: 900;
        letter-spacing: 0.8rem;
        text-transform: uppercase;
        margin-bottom: 2rem;
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        display: inline-block;
        padding-bottom: 1rem;
      }

      p {
        font-size: 1.2rem;
        line-height: 1.6;
        color: rgba(0, 0, 0, 0.7); /* Dark text on gold bar */
        font-weight: 600;
        max-width: 450px;
        margin: 0 auto 2rem;
      }

      .id-badge {
        background: var(--gold);
        color: var(--obsidian);
        padding: 0.5rem 1.5rem;
        border-radius: 5px;
        font-weight: 900;
        letter-spacing: 0.1rem;
      }

      @keyframes cardEntrance {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="success-card">
      <span class="gold-key">🔑</span>
      <h1>CLIQUE</h1>
      <p>
        Votre place parmi les 100 premiers Souverains a été réservée. L'accès à
        la CLIQUE est imminent.
      </p>
      <div class="id-badge">SÉCURITÉ VÉRIFIÉE</div>
    </div>
  </body>
</html>
