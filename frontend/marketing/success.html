<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demande Reçue | ZYEYTÉ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --obsidian: #0a0a0a;
        --gold: #d4af37;
        --suede-text: #e5e5e5;
        --gold-glow: 0 0 30px rgba(212, 175, 55, 0.4);
      }

      body {
        background-color: var(--obsidian);
        color: var(--suede-text);
        font-family: "Outfit", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }

      .success-card {
        padding: 4rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--gold);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        animation: cardEntrance 1s ease-out;
      }

      .gold-key {
        font-size: 5rem;
        margin-bottom: 2rem;
        display: block;
        text-shadow: var(--gold-glow);
      }

      h1 {
        color: var(--gold);
        font-weight: 900;
        letter-spacing: 0.5rem;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }

      p {
        font-size: 1.2rem;
        line-height: 1.6;
        color: #bbb;
        max-width: 400px;
        margin: 0 auto 2rem;
      }

      .id-badge {
        background: var(--gold);
        color: var(--obsidian);
        padding: 0.5rem 1.5rem;
        border-radius: 5px;
        font-weight: 900;
        letter-spacing: 0.1rem;
      }

      @keyframes cardEntrance {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="success-card">
      <span class="gold-key">🔑</span>
      <h1>Demande Envoyée</h1>
      <p>
        Votre place parmi les 100 premiers Souverains a été réservée. Nous
        analysons votre influence.
      </p>
      <div class="id-badge">SÉCURITÉ VÉRIFIÉE</div>
    </div>
  </body>
</html>
