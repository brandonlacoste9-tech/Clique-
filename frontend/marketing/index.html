<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHATSNAP | Sovereign Protocol</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --obsidian: #050505;
        --gold: #d4af37;
        --gold-bright: #ffefaf;
        --gold-dark: #8c6d1f;
        --suede-text: #e8e8e1;
        --bullion-grad: linear-gradient(
          to right,
          #d4af37 0%,
          #ffefaf 50%,
          #8c6d1f 100%
        );
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--obsidian);
        color: var(--suede-text);
        font-family: "Outfit", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-image: radial-gradient(circle at top, #111 0%, var(--obsidian) 80%);
      }

      .auth-card {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(212, 175, 55, 0.2);
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      }

      .logo-mini {
        width: 140px;
        height: 80px;
        background: var(--bullion-grad);
        border-radius: 8px;
        margin: 0 auto 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .logo-mini::before {
        content: "CHATSNAP • 999.9";
        position: absolute;
        top: 8px;
        font-size: 0.5rem;
        font-weight: 900;
        letter-spacing: 0.1rem;
        color: rgba(0,0,0,0.4);
      }

      .logo-text { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.1rem; color: rgba(0,0,0,0.7); }
      h1 { font-size: 1.5rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 0.5rem; text-transform: uppercase; }
      .tagline { font-size: 0.7rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); margin-bottom: 2.5rem; text-transform: uppercase; }

      .form-group { display: flex; flex-direction: column; gap: 1.5rem; }
      .auth-input {
        width: 100%; height: 60px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0 1.5rem; color: #fff;
        font-family: inherit; font-size: 1.1rem;
        outline: none; transition: border-color 0.3s; text-align: center;
      }
      .auth-input:focus { border-color: var(--gold); }

      .cta-button {
        width: 100%; height: 60px;
        background: var(--bullion-grad);
        color: #000; border: none; border-radius: 8px;
        font-size: 1rem; font-weight: 900; letter-spacing: 2px;
        cursor: pointer; transition: transform 0.2s, opacity 0.3s;
        text-transform: uppercase;
      }
      .cta-button:hover { transform: translateY(-2px); }
      .cta-button:disabled { opacity: 0.5; cursor: not-allowed; }

      .footer-note { margin-top: 2.5rem; font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
      #otp-section { display: none; }
      .error-msg { color: #ff5e5e; font-size: 0.8rem; margin-top: 1rem; display: none; padding: 10px; border-radius: 4px; background: rgba(255,0,0,0.1); }
      .deep-link-btn { margin-top: 1.5rem; display: block; color: var(--gold); font-size: 0.8rem; text-decoration: none; opacity: 0.6; font-weight: 700; }
      
      .bypass-btn {
        margin-top: 1rem; text-decoration: underline; color: #ff9500; font-size: 0.8rem; cursor: pointer; display: block;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="logo-mini">
        <span class="logo-text">CHATSNAP</span>
      </div>
      
      <h1>CHATSNAP LOGIN</h1>
      <p class="tagline">The Elite of the Moment</p>

      <div class="form-group" id="phone-section">
        <input type="tel" id="phone-input" placeholder="514 555 0123" class="auth-input" />
        <button class="cta-button" id="send-otp-btn">SEND SECURITY CODE</button>
      </div>

      <div class="form-group" id="otp-section">
        <p style="font-size: 0.8rem; color: var(--gold); margin-bottom: 0.5rem;">VÉRIFICATION CODE (CODE: 123123)</p>
        <input type="text" id="otp-input" placeholder="123123" class="auth-input" maxlength="6" />
        <button class="cta-button" id="verify-otp-btn">VERIFY & ENTER</button>
        <a href="#" id="change-phone-link" style="color: rgba(255,255,255,0.4); font-size: 0.7rem; text-decoration: none; margin-top: 10px; display: block;">Change phone number</a>
      </div>

      <div id="error-box" class="error-msg"></div>

      <div class="footer-note">CHATSNAP • BILINGUAL • SECURE • QUÉBECOIS</div>

      <div id="dev-links">
        <a href="chatsnap://auth" class="deep-link-btn">OPEN IN MOBILE APP ▸</a>
        <span class="bypass-btn" id="hard-bypass">HARD BYPASS: ENTER APP NOW</span>
      </div>
    </div>

    <script>
      // DYNAMIC BACKEND DISCOVERY
      const BACKEND_URLS = [
        window.location.origin + '/api', // Production proxy
        'http://localhost:3001',         // Local dev
        'https://chatsnap.ca/api',       // Production absolute
        'http://192.168.2.26:3001'      // Last known Local IP
      ];

      let activeUrl = BACKEND_URLS[0];

      const phoneSection = document.getElementById('phone-section');
      const otpSection = document.getElementById('otp-section');
      const phoneInput = document.getElementById('phone-input');
      const otpInput = document.getElementById('otp-input');
      const sendBtn = document.getElementById('send-otp-btn');
      const verifyBtn = document.getElementById('verify-otp-btn');
      const errorBox = document.getElementById('error-box');
      const changePhoneLink = document.getElementById('change-phone-link');
      const hardBypass = document.getElementById('hard-bypass');

      let currentPhone = "";

      const showError = (msg) => {
        console.error("DEBUG:", msg);
        errorBox.innerText = msg;
        errorBox.style.display = 'block';
        setTimeout(() => { errorBox.style.display = 'none'; }, 6000);
      };

      // Tries multiple backend URLs sequentially
      const sovereignFetch = async (endpoint, options) => {
        let lastError = null;
        for (const url of BACKEND_URLS) {
          try {
            console.log(`Trying backend: ${url}${endpoint}`);
            const res = await fetch(`${url}${endpoint}`, options);
            if (res.ok || res.status === 401 || res.status === 429) {
                activeUrl = url;
                return res;
            }
          } catch (e) {
            lastError = e;
            console.warn(`URL failed: ${url}`, e);
          }
        }
        throw lastError || new Error("All backends unreachable");
      };

      sendBtn.addEventListener('click', async () => {
        const phone = phoneInput.value.replace(/\s+/g, '');
        if (phone.length < 10) return showError("Enter valid phone number.");

        sendBtn.disabled = true;
        sendBtn.innerText = "FORGING...";

        try {
          const res = await sovereignFetch('/auth/otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
          });

          if (res.ok) {
            currentPhone = phone;
            phoneSection.style.display = 'none';
            otpSection.style.display = 'flex';
          } else {
            const data = await res.json();
            showError(data.error || "Request failed.");
          }
        } catch (e) {
          showError("Backend unavailable. Ensure the server is running on port 3001.");
        } finally {
          sendBtn.disabled = false;
          sendBtn.innerText = "SEND SECURITY CODE";
        }
      });

      verifyBtn.addEventListener('click', async () => {
        const otp = otpInput.value;
        if (otp.length !== 6) return showError("Enter 6-digit code.");

        verifyBtn.disabled = true;
        verifyBtn.innerText = "VERIFYING...";

        try {
          const res = await fetch(`${activeUrl}/auth/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: currentPhone, otp })
          });

          const data = await res.json();
          if (res.ok && data.token) {
            window.location.href = "chatsnap://auth?token=" + data.token;
            verifyBtn.innerText = "ACCESS GRANTED";
            setTimeout(() => { alert("Opening ChatSnap..."); }, 500);
          } else {
            showError(data.error || "Invalid code.");
          }
        } catch (e) {
          showError("Verification connection failed.");
        } finally {
          verifyBtn.disabled = false;
          verifyBtn.innerText = "VERIFY & ENTER";
        }
      });

      changePhoneLink.addEventListener('click', (e) => {
        e.preventDefault();
        phoneSection.style.display = 'flex';
        otpSection.style.display = 'none';
      });

      hardBypass.addEventListener('click', () => {
        window.location.href = "chatsnap://auth?token=bypass_guest_token";
        alert("Redirecting to ChatSnap App...");
      });
    </script>
  </body>
</html>
